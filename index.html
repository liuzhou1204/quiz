ry":"综合","type":"judge","qType":"judge"},{"q":"权力的本质是影响力","answer":"正确","explain":"","category":"综合","type":"judge","qType":"judge"},{"q":"某投资项目的现金流量如下表所示（单位：万元）\\n年份\\n1\\n2\\n3\\n4\\n5\\n6\\n7\\n现金支出\\n100\\n200\\n100\\n50\\n100\\n150\\n150\\n现金收入\\n0\\n0\\n50\\n100\\n200\\n300\\n300\\n要求：计算第 3 年、第 5 年、第 6 年的净现金流量及静态投资回收期。","answer":"第 3 年净现金流量：-50第 5 年净现金流量：100第 6 年净现金流量：150静态投资回收期：5.33 年","explain":"","category":"综合","type":"fill","qType":"fill"},{"q":"2. 挣值管理分析\\n已知工序预算：A=250 千元，B=300 千元，C=900 千元，D=550 千元，E=400 千元，F=200 千元。第 8 周末计划完成整个任务的 70%；实际费用：A=280，B=340，C=920，D=550，E=100，F=0；A、C 已 100% 完成。要求计算：EV、PV、AC、CV、SV、EAC。","answer":"EV（工序 A）= 250 千元EV（工序 C）= 900 千元PV = 1820 千元ACWP = 2190 千元CV = -170 千元SV = 200 千元EAC ≈ 2826 千元","explain":"","category":"综合","type":"fill","qType":"fill"},{"q":"3. 影子价格计算\\n某企业生产需进口 AA 材料，到岸价格 60 元，影子汇率 1.2，国内运费 20 元，求影子价格。","answer":"92 元","explain":"影子价格 = 60×1.2 + 20 = 92 元","category":"综合","type":"fill","qType":"fill"},{"q":"4. 单利与复利利息计算\\n某人向银行借款 20000 元，借期 3 年，利率 5%，求单利和复利利息。","answer":"单利利息：3000 元复利利息：3152.5 元","explain":"","category":"综合","type":"fill","qType":"fill"},{"q":"5. 决策树分析（生产线更新方案）\\n方案 1：全自动，投资 400 万，经营 10 年，成功 0.7 获利 200 万 / 年，失败 0.3 亏损 50 万 / 年。方案 2：分阶段，第一阶段投资 20 万经营 5 年，成功 0.7 获利 120 万 / 年，失败 0.3 获利 10 万 / 年；5 年后追加投资 130 万，后 5 年成功 0.9 获利 200 万 / 年，失败 0.1 获利 20 万 / 年。求两方案期望净收益并决策。","answer":"方案 1 期望净收益：850 万元方案 2 期望净收益：1195 万元最终决策：选择方案 2","explain":"","category":"综合","type":"fill","qType":"fill"},{"q":"6. 人力费用计算\\n工作 A：工程师工作量 40 工日，成本 1000 元 / 工日，固定费用 10 千元。求人力费用。","answer":"人力费用 = 40 千元","explain":"","category":"综合","type":"fill","qType":"fill"},{"q":"7. 项目最短工期计算\\n某项目包括工作 A（5 周）、B（6 周）、C（7 周）。B 必须在 A 完成后开始，C 只能在 B 开始 1 周后开始，前期资源分配需 1 周。求最短工期。","answer":"14 周","explain":"","category":"综合","type":"fill","qType":"fill"}]'),vc={questions:gc},hc=vc.questions,mc=JSON.parse('[{"q":"项目经理在项目章程获得批准之前应主要关注什么？","options":["制定详细的项目管理计划","识别所有项目相关方","理解商业论证并确保需求可行","创建工作分解结构（WBS）"],"answer":"C","explain":"章程批准前处于启动阶段，重点是理解商业论证、评估可行性、识别高层级需求。详细计划在规划阶段才做。","category":"整合管理","type":"single","qType":"single"},{"q":"变更控制委员会（CCB）的主要职责是什么？","options":["执行项目变更","审批或否决变更请求","识别需要变更的项目","更新项目管理计划"],"answer":"B","explain":"CCB 是一个正式组成的团体，负责审查、评估、批准、推迟或否决项目变更，以及记录和传达变更处理决定。","category":"整合管理","type":"single","qType":"single"},{"q":"项目收尾阶段，项目经理应该确保完成以下哪些工作？","options":["仅归档项目文件","仅获得客户验收","完成所有过程组的收尾活动，包括经验教训归档","立即解散项目团队"],"answer":"C","explain":"收尾阶段需要完成所有过程组的收尾活动：确认工作已完成、获得验收、归档文件、记录经验教训、释放资源。","category":"整合管理","type":"single","qType":"single"},{"q":"配置控制重点关注以下哪项？","options":["识别和记录产品的功能及物理特征","对变更进行控制并记录","项目文件版本管理","以上全部"],"answer":"D","explain":"配置控制包含识别配置项、控制变更、记录状态，涵盖了以上所有内容。","category":"整合管理","type":"single","qType":"single"},{"q":"以下哪项工具或技术用于收集需求？","options":["WBS","范围基准","焦点小组会议","确认范围"],"answer":"C","explain":"焦点小组会议是收集需求过程的工具。WBS 是创建WBS过程的工具，范围基准是规划范围管理的输出，确认范围是独立的监控过程。","category":"范围管理","type":"single","qType":"single"},{"q":"WBS 的最低层级叫做什么？","options":["控制账户","工作包","规划包","活动"],"answer":"B","explain":"WBS 的最低层级是工作包（Work Package），在该层级可以估算成本和持续时间。控制账户高于工作包。","category":"范围管理","type":"single","qType":"single"},{"q":"确认范围过程与质量控制的区别是什么？","options":["两者没有区别","确认范围关注可交付成果的正确性，质量控制关注可交付成果的验收","确认范围关注客户验收，质量控制关注可交付成果是否符合质量标准","确认范围由QA执行，质量控制由客户执行"],"answer":"C","explain":"确认范围是正式验收已完成可交付成果的过程（由客户/发起人执行），质量控制是检查可交付成果是否满足质量要求的过程（由团队/PM执行）。两者先后顺序是先质控再确认。","category":"范围管理","type":"single","qType":"single"},{"q":"以下关于范围蔓延的说法，正确的是？","options":["范围蔓延是经过批准的范围变更","范围蔓延是未经控制的产品或项目范围的扩大","范围蔓延只发生在范围确认过程","范围蔓延不影响项目成本"],"answer":"B","explain":"范围蔓延（Scope Creep）指未经过正式变更控制程序的范围扩大，是项目管理中的常见风险，会导致成本增加和进度延误。","category":"范围管理","type":"single","qType":"single"},{"q":"关键路径法（CPM）中，关键路径的定义是什么？","options":["项目中最短的路径","耗时最长的路径，决定项目最短完工时间","资源消耗最多的路径","成本最高的路径"],"answer":"B","explain":"关键路径是项目网络图中耗时最长的路径，它决定了项目的最短可能完工时间。关键路径上的活动总浮动时间为零。","category":"进度管理","type":"single","qType":"single"},{"q":"总浮动时间与自由浮动时间的区别是什么？","options":["没有区别","总浮动基于总工期计算，自由浮动基于紧后活动最早开始计算","自由浮动总是大于总浮动","总浮动只用于关键路径"],"answer":"B","explain":"总浮动 = 不延误项目完工的前提下可延迟的时间；自由浮动 = 不延误紧后活动最早开始的前提下可延迟的时间。自由浮动 ≤ 总浮动。","category":"进度管理","type":"single","qType":"single"},{"q":"资源优化技术包括以下哪些？","options":["资源平衡和资源平滑","快速跟进和赶工","关键链法和PERT","挣值管理和三点估算"],"answer":"A","explain":"资源平衡（Resource Leveling）可能导致关键路径改变；资源平滑（Resource Smoothing）不改变关键路径，只对自由浮动时间内的资源进行调整。","category":"进度管理","type":"single","qType":"single"},{"q":"在进度压缩中，赶工（Crashing）的主要特点是什么？","options":["只增加资源不增加成本","通过增加资源来缩短工期，通常会增加成本","通过并行执行活动来缩短工期","不改变项目范围"],"answer":"B","explain":"赶工是通过投入额外资源（加班、加人等）来压缩进度，通常会增加成本和风险。快速跟进（Fast-tracking）则是并行执行活动，可能增加风险但不一定增加成本。","category":"进度管理","type":"single","qType":"single"},{"q":"挣值管理中，CPI 等于 0.85 意味着什么？","options":["项目进度超前15%","项目成本超支，每花1元只完成0.85元的价值","项目成本节约15%","项目将提前完工"],"answer":"B","explain":"CPI = EV/AC。CPI=0.85 < 1，说明成本绩效不佳，每投入1元只获得了0.85元的价值产出，即超支约15%。","category":"成本管理","type":"single","qType":"single"},{"q":"完工估算（EAC）在典型偏差情况下的计算公式是？","options":["AC + ETC","BAC / CPI","AC + (BAC - EV)","BAC × CPI"],"answer":"B","explain":"典型偏差意味着当前成本偏差代表未来趋势，EAC = BAC / CPI。这假设未来将按当前效率继续执行。","category":"成本管理","type":"single","qType":"single"},{"q":"以下哪项属于项目直接成本？","options":["项目经理薪酬","项目材料的采购费","公司总部的租金","培训项目团队的成本"],"answer":"B","explain":"直接成本是可直接归因于项目工作的成本（如材料、设备）。项目经理薪酬、总部租金属于间接成本。","category":"成本管理","type":"single","qType":"single"},{"q":"类比估算和参数估算的主要区别是？","options":["类比估算更准确","参数估算使用历史数据，类比估算不使用","参数估算使用统计关系和历史数据，类比估算使用类似项目的经验","没有区别"],"answer":"C","explain":"类比估算（自上而下）基于类似项目经验调整，速度快但精度低；参数估算基于历史数据的统计关系（如每平方米成本），精度较高。","category":"成本管理","type":"single","qType":"single"},{"q":"以下哪个是质量成本中「预防成本」的例子？","options":["返工费用","培训项目团队成员","产品缺陷的保修费用","客户退货处理费用"],"answer":"B","explain":"预防成本是为防止缺陷发生而投入的成本，如培训、流程设计、质量规划。返工是内部失败成本，保修和退货是外部失败成本。","category":"质量管理","type":"single","qType":"single"},{"q":"石川图（因果图）的主要用途是什么？","options":["追踪项目进度","识别导致特定问题的根本原因","展示项目组织结构","分析风险概率"],"answer":"B","explain":"石川图（鱼骨图）用于因果分析，系统性地识别导致某个特定问题的所有可能原因（人、机、料、法、环、测）。","category":"质量管理","type":"single","qType":"single"},{"q":"持续改进过程中，PDCA 循环的正确顺序是？","options":["计划-执行-检查-行动","计划-检查-执行-行动","行动-计划-执行-检查","执行-计划-检查-行动"],"answer":"A","explain":"PDCA（戴明环）：Plan（计划）→ Do（执行）→ Check（检查）→ Act（处理/行动），是持续改进的经典方法。","category":"质量管理","type":"single","qType":"single"},{"q":"塔克曼团队发展模型的五个阶段按顺序是？","options":["形成-震荡-规范-成熟-解散","形成-规范-震荡-成熟-解散","形成-成熟-震荡-规范-解散","规范-形成-震荡-成熟-解散"],"answer":"A","explain":"塔克曼模型：Forming（形成）→ Storming（震荡）→ Norming（规范）→ Performing（成熟）→ Adjourning（解散）。","category":"资源管理","type":"single","qType":"single"},{"q":"项目经理在冲突解决中最推荐使用的方法是？","options":["强制命令","撤回/回避","合作/解决问题","妥协/调解"],"answer":"C","explain":"PMP 认为面对/解决问题（Collaborate）是最优方法，能找到根本原因并获得双赢。撤退和强制是最后手段。","category":"资源管理","type":"single","qType":"single"},{"q":"以下哪项是构建团队过程的输出？","options":["团队章程","项目团队派工单","团队绩效评价","事业环境因素更新"],"answer":"C","explain":"建设团队的输出包括：团队绩效评价、变更请求、事业环境因素更新、组织过程资产更新。团队章程是规划资源管理的输出。","category":"资源管理","type":"single","qType":"single"},{"q":"沟通渠道数量的计算公式是？","options":["n × (n-1)","n × (n-1) / 2","2^n","n²"],"answer":"B","explain":"沟通渠道 = n(n-1)/2，其中 n 为相关方数量。例如10个相关方有 10×9/2=45 条沟通渠道。","category":"沟通管理","type":"single","qType":"single"},{"q":"项目经理发现团队成员对项目目标理解不一致，应首先采取什么行动？","options":["升级给发起人","召开项目启动大会","更新沟通管理计划","发送电子邮件通知"],"answer":"B","explain":"项目启动大会（Kickoff Meeting）是统一团队对项目目标和期望理解的关键活动，应在规划开始前举行。","category":"沟通管理","type":"single","qType":"single"},{"q":"以下哪项是威胁应对策略中的「规避」的例子？","options":["购买保险","修改项目计划以消除威胁","建立应急储备","接受风险发生后的影响"],"answer":"B","explain":"规避（Avoid）是通过改变项目计划来消除威胁或保护项目免受威胁影响。买保险是转移，应急储备是减轻，接受影响是接受。","category":"风险管理","type":"single","qType":"single"},{"q":"风险评估中，概率和影响矩阵的作用是什么？","options":["量化风险的成本","将风险按照优先级进行排序","消除所有已识别的风险","确定风险的发生概率"],"answer":"B","explain":"概率和影响矩阵（风险矩阵）用于将风险按优先级排序，帮助确定哪些风险需要积极应对，哪些只需要观察。","category":"风险管理","type":"single","qType":"single"},{"q":"以下哪项属于已知-未知风险？","options":["不可抗力","已识别并已规划应急应对措施的风险","完全无法预测的事件","未知的技术问题"],"answer":"B","explain":"已知-未知风险是已识别但无法确定发生概率的风险，通常通过应急储备（Contingency Reserve）来应对。未知-未知风险通过管理储备（Management Reserve）应对。","category":"风险管理","type":"single","qType":"single"},{"q":"以下哪种合同类型对买方风险最大？","options":["固定总价合同（FFP）","成本加激励费合同（CPIF）","工料合同（T&M）","总价加经济价格调整合同（FP-EPA）"],"answer":"B","explain":"成本补偿类合同（如CPIF）中买方承担最大风险，因为要报销卖方的实际成本。固定总价合同（FFP）对买方风险最小。","category":"采购管理","type":"single","qType":"single"},{"q":"采购谈判中，协议条款和条件的最终确定应该在哪个过程完成？","options":["规划采购管理","实施采购","控制采购","结束采购"],"answer":"B","explain":"实施采购过程中获得卖方应答、选择卖方并授予合同。谈判和合同签订是实施采购过程的核心活动。","category":"采购管理","type":"single","qType":"single"},{"q":"权力/利益方格中，对于「高权力-低利益」的相关方应采取什么策略？","options":["重点管理","令其满意","监督","随时告知"],"answer":"B","explain":"高权力-低利益的相关方应「令其满意」（Keep Satisfied），因为他们有影响力但不直接参与。重点管理是高权力-高利益策略。","category":"相关方管理","type":"single","qType":"single"},{"q":"相关方参与计划的主要目的是？","options":["识别所有相关方","确定引导相关方参与项目决策和执行的策略","分配项目预算","创建沟通渠道"],"answer":"B","explain":"相关方参与计划确定用于促进相关方（当前和预期）参与项目决策和执行的策略和行动。","category":"相关方管理","type":"single","qType":"single"},{"q":"以下哪些属于项目执行的输入？","options":["项目管理计划","批准的变更请求","事业环境因素","团队派工单"],"answer":"ABCD","explain":"项目执行指导与管理过程的输入包括：项目管理计划、项目文件（如变更日志、经验教训登记册）、批准的变更请求、事业环境因素、组织过程资产。","category":"整合管理","type":"multi","qType":"multi"},{"q":"以下哪些属于质量管理工具？","options":["帕累托图","控制图","鱼骨图","甘特图"],"answer":"ABC","explain":"帕累托图（80/20法则）、控制图（监控过程稳定性）、鱼骨图（因果分析）都是质量管理七大基本工具之一。甘特图是进度管理工具。","category":"质量管理","type":"multi","qType":"multi"},{"q":"识别风险过程中可用的技术包括以下哪些？","options":["头脑风暴","SWOT分析","核对单分析","挣值分析"],"answer":"ABC","explain":"头脑风暴、SWOT分析（优势-劣势-机会-威胁）、核对单分析都是识别风险的工具技术。挣值分析是监控项目工作的技术。","category":"风险管理","type":"multi","qType":"multi"},{"q":"以下哪些是有效的团队建设活动？","options":["虚拟团队中的视频会议","每日站会","团建活动（如聚餐、户外拓展）","严格的绩效考核"],"answer":"ABC","explain":"视频会议促进虚拟团队沟通、每日站会增强协作、团建活动增进信任。严格绩效考核不是团队建设活动，属于管理手段。","category":"资源管理","type":"multi","qType":"multi"},{"q":"项目章程只能由项目经理编制。","answer":"错","explain":"项目章程由项目发起人或发起人代表编制，也可以由项目经理联合发起人编制，但不能只由项目经理单独编制。章程的批准权属于发起人。","category":"整合管理","type":"judge","qType":"judge"},{"q":"在敏捷开发中，产品待办列表的优先级由项目经理决定。","answer":"错","explain":"在敏捷/Scrum中，产品待办列表（Product Backlog）的优先级由产品负责人（Product Owner）决定，不是项目经理。","category":"资源管理","type":"judge","qType":"judge"},{"q":"质量审计是独立的结构化审查，用于确定项目活动是否符合组织和项目政策。","answer":"对","explain":"质量审计是实施质量保证过程的重要工具，由独立于项目团队的审计人员执行，确保项目活动遵循组织政策、过程和标准。","category":"质量管理","type":"judge","qType":"judge"},{"q":"应急储备用于应对已知-未知风险，管理储备用于应对未知-未知风险。","answer":"对","explain":"应急储备（Contingency Reserve）包含在成本基准中，用于已知-未知风险；管理储备（Management Reserve）不包含在成本基准中，用于未知-未知风险，需管理层审批才能使用。","category":"风险管理","type":"judge","qType":"judge"},{"q":"项目管理三角形（铁三角）的三个要素是：范围、_____ 和 _____。","answer":"时间、成本","explain":"项目管理的「铁三角」由范围、时间（进度）和成本三个相互制约的要素组成。质量位于三角形的中心，受三者影响。","category":"综合","type":"fill","qType":"fill"},{"q":"EVM 中，进度绩效指数 SPI = _____ / _____。","answer":"EV、PV","explain":"SPI（Schedule Performance Index）= 挣值（EV） / 计划价值（PV）。SPI>1 表示进度超前，SPI<1 表示进度落后。","category":"成本管理","type":"fill","qType":"fill"},{"q":"项目整合管理中，以下哪个过程属于监控过程组？","options":["制定项目章程","指导与管理项目工作","实施整体变更控制","结束项目或阶段"],"answer":"C","explain":"实施整体变更控制是唯一的监控过程组过程。其他选项分别属于启动、执行和收尾过程组。","category":"整合管理","type":"single","qType":"single"},{"q":"项目经理应何时通知相关方项目章程已获批准？","options":["在项目章程编制完成后","在项目章程获批后尽快通知","在制定项目管理计划后","在项目启动大会召开时"],"answer":"B","explain":"项目章程获批后，项目经理应尽快通知相关方，确保项目正式获得授权，相关方了解项目目标。","category":"整合管理","type":"single","qType":"single"},{"q":"项目章程中通常不包含以下哪项内容？","options":["项目目的","高层级需求","详细预算","可衡量的项目目标和成功标准"],"answer":"C","explain":"项目章程是高层级文件，不包含详细预算。详细预算在成本管理知识领域的成本估算和制定预算过程中制定。","category":"整合管理","type":"single","qType":"single"},{"q":"项目经理发现一项变更将显著影响项目基准，正确的做法是？","options":["直接实施变更","记录变更并提交给CCB审批","自行决定是否实施","通知发起人等待指示"],"answer":"B","explain":"影响项目基准的变更必须通过实施整体变更控制过程，提交变更请求给CCB或指定负责人审批。","category":"整合管理","type":"single","qType":"single"},{"q":"需求跟踪矩阵（RTM）的主要作用是什么？","options":["跟踪项目进度","将需求与可交付成果、测试用例等关联起来","管理项目成本","分配团队成员职责"],"answer":"B","explain":"RTM 把产品需求从来源连接到满足需求的可交付成果，确保每项需求都得到跟踪、测试和验证。","category":"范围管理","type":"single","qType":"single"},{"q":"确认范围过程的主要工具与技术是？","options":["偏差分析","检查和群体决策技术","趋势分析","替代方案分析"],"answer":"B","explain":"确认范围过程使用的工具与技术是检查（包括审查、产品评审、审计和走查）和群体决策技术。","category":"范围管理","type":"single","qType":"single"},{"q":"以下哪项是范围基准的组成部分？","options":["需求文件","项目范围说明书、WBS和WBS词典","项目进度计划","风险登记册"],"answer":"B","explain":"范围基准由项目范围说明书、工作分解结构（WBS）和WBS词典三个组成部分构成，是确认范围和控制范围的依据。","category":"范围管理","type":"single","qType":"single"},{"q":"项目经理发现团队成员在没有变更请求的情况下对产品做了修改，最恰当的做法是？","options":["忽略，因为修改有益","要求撤销修改并提交变更请求","上报管理层","保留修改并记录在案"],"answer":"B","explain":"任何对产品的修改都必须通过变更控制程序。未经批准的变更（范围蔓延）应被撤销，并提交正式变更请求。","category":"范围管理","type":"single","qType":"single"},{"q":"快速跟进（Fast-tracking）的风险是什么？","options":["增加成本","增加返工风险","延长工期","降低质量"],"answer":"B","explain":"快速跟进是并行执行原本串行的活动，可能增加返工风险，因为它改变了活动间的逻辑关系。赶工才是增加成本。","category":"进度管理","type":"single","qType":"single"},{"q":"三点估算（PERT）中，最可能时间（tM）的权重是？","options":["与乐观时间和悲观时间相同","是最乐观和最悲观之间最可能的时间","权重是其他时间的4倍","权重是其他时间的2倍"],"answer":"C","explain":"PERT公式：tE = (tO + 4×tM + tP) / 6。最可能时间的权重为4，是最乐观和最悲观时间权重（各1）的4倍。","category":"进度管理","type":"single","qType":"single"},{"q":"以下哪种活动依赖关系是最常见的？","options":["强制性依赖关系","选择性依赖关系","外部依赖关系","内部依赖关系"],"answer":"A","explain":"强制性依赖关系（硬逻辑）是法律或合同要求的或工作固有的依赖关系，是最常见的依赖类型。","category":"进度管理","type":"single","qType":"single"},{"q":"进度管理计划中不包括以下哪项内容？","options":["项目进度模型","测量单位和精度","关键路径的识别方式","项目预算"],"answer":"D","explain":"项目预算属于成本管理计划的内容，不属于进度管理计划。进度管理计划包含进度模型、精度、单位、控制临界值等。","category":"进度管理","type":"single","qType":"single"},{"q":"管理储备与应急储备的主要区别是？","options":["没有区别","应急储备针对已知风险，管理储备针对未知风险","管理储备包含在成本基准中","应急储备需要发起人批准才能使用"],"answer":"B","explain":"应急储备针对已知-未知风险，包含在成本基准中；管理储备针对未知-未知风险，不包含在成本基准中，需管理层审批。","category":"成本管理","type":"single","qType":"single"},{"q":"以下哪种估算方法在项目信息不足时最适合？","options":["自下而上估算","类比估算","参数估算","三点估算"],"answer":"B","explain":"类比估算在项目详细信息不足时是最佳选择，它使用类似项目的历史数据作为估算基础，速度快但精度较低。","category":"成本管理","type":"single","qType":"single"},{"q":"成本基准由什么组成？","options":["应急储备 + 管理储备","各工作包估算之和 + 应急储备","项目总预算","直接成本 + 间接成本"],"answer":"B","explain":"成本基准 = 各工作包/活动的成本估算总和 + 应急储备（已知-未知风险）。管理储备不包含在成本基准内。","category":"成本管理","type":"single","qType":"single"},{"q":"TCPI（完工绩效指数）的含义是什么？","options":["已完成工作的成本效率","为完成剩余工作所需的成本效率","项目整体进度效率","已花费预算占总预算的比例"],"answer":"B","explain":"TCPI = (BAC - EV) / (BAC - AC)，表示为完成剩余工作每单位成本需要创造多少价值，是衡量未来绩效的指标。","category":"成本管理","type":"single","qType":"single"},{"q":"控制图的用途是什么？","options":["确定质量问题原因","判断过程是否稳定及是否在控制限内","展示趋势变化","确定缺陷优先级"],"answer":"B","explain":"控制图用于监控过程是否稳定，判断过程输出是否在控制上下限内。七点规则等异常模式表明过程失控。","category":"质量管理","type":"single","qType":"single"},{"q":"零缺陷理念的倡导者是？","options":["戴明","朱兰","克劳斯比","石川馨"],"answer":"C","explain":"零缺陷（Zero Defects）理念由克劳斯比提出，主张第一次就把事情做对。戴明提出PDCA循环，石川馨发明了鱼骨图。","category":"质量管理","type":"single","qType":"single"},{"q":"以下哪项是规划质量管理过程的输出？","options":["质量测量指标","质量报告","检查结果","核实的可交付成果"],"answer":"A","explain":"质量测量指标是规划质量管理的输出。B、C、D分别是管理质量、控制质量的输出。","category":"质量管理","type":"single","qType":"single"},{"q":"帕累托图（80/20法则）主要用来解决什么问题？","options":["识别过程稳定性","找出导致大多数问题的关键少数原因","追踪缺陷趋势","建立质量标准"],"answer":"B","explain":"帕累托图基于帕累托原理（80%的问题由20%的原因造成），用于识别对质量影响最大的少数关键因素。","category":"质量管理","type":"single","qType":"single"},{"q":"以下哪种组织结构中项目经理权力最大？","options":["职能型组织","弱矩阵型组织","项目型组织","平衡矩阵型组织"],"answer":"C","explain":"项目型组织中项目经理拥有最高权力，是全职角色，对资源有完全控制权。职能型中项目经理权力最小。","category":"资源管理","type":"single","qType":"single"},{"q":"以下哪种冲突解决方法属于「输-输」策略？","options":["合作/解决问题","撤退/回避","强制/命令","妥协/调解"],"answer":"B","explain":"撤退/回避属于输-输策略（双方都不满意）。合作/解决问题是双赢，强制是赢-输，妥协是部分妥协。","category":"资源管理","type":"single","qType":"single"},{"q":"预分派（Pre-assignment）工具通常在什么情况下使用？","options":["团队成员从外部招聘","项目章程中指定了某些人员","竞争性招标中选出的卖方","虚拟团队组建时"],"answer":"B","explain":"预分派是在项目启动前已确定项目团队成员的情况，如竞标方案中承诺的专家或项目章程中指定的人员。","category":"资源管理","type":"single","qType":"single"},{"q":"塔克曼模型中，「震荡」阶段的主要特征是？","options":["团队成员客气、礼貌","团队开始产生冲突和分歧","团队高效协作","团队成员逐渐疏远"],"answer":"B","explain":"震荡（Storming）阶段，团队成员开始表达不同意见，可能出现权力争夺、意见分歧和冲突。这是团队发展的关键阶段。","category":"资源管理","type":"single","qType":"single"},{"q":"项目经理花了70%以上的时间在做什么？","options":["技术工作","沟通","风险管理","质量控制"],"answer":"B","explain":"PMP强调项目经理的大部分时间（70%-90%）用于沟通活动，包括与相关方、团队成员、管理层等的各种沟通。","category":"沟通管理","type":"single","qType":"single"},{"q":"以下哪项不是沟通模型的要素？","options":["编码","传递信息","确认收到","项目预算"],"answer":"D","explain":"沟通模型包含编码、传递信息、解码、确认收到/理解等要素。项目预算不属于沟通模型。","category":"沟通管理","type":"single","qType":"single"},{"q":"沟通方法中，「推式沟通」的例子是？","options":["团队会议","电子邮件通知","知识库查询","即时通讯聊天"],"answer":"B","explain":"推式沟通是向需要接收信息的特定接收方发送或发布信息（如电子邮件、备忘录、报告）。交互式沟通是会议。","category":"沟通管理","type":"single","qType":"single"},{"q":"当沟通中出现噪音导致信息失真时，项目经理应该？","options":["发送更多信息以补偿","确认接收方理解了原始信息","忽略噪音继续沟通","更换沟通渠道"],"answer":"B","explain":"有效沟通要求确保信息被正确理解，项目经理应确认接收方理解了信息。反馈回路是确保理解的关键。","category":"沟通管理","type":"single","qType":"single"},{"q":"以下哪项是消极风险（威胁）的应对策略？","options":["开拓","分享","减轻","提高"],"answer":"C","explain":"威胁应对策略：规避、转移、减轻、接受。开拓、分享、提高属于机会（积极风险）的应对策略。","category":"风险管理","type":"single","qType":"single"},{"q":"风险审计的目的是什么？","options":["识别新风险","评估风险管理过程的有效性","量化风险影响","确定风险应对策略"],"answer":"B","explain":"风险审计用于评估风险管理过程的有效性，检查风险应对措施是否得到有效执行，是监督风险过程的重要工具。","category":"风险管理","type":"single","qType":"single"},{"q":"以下哪个工具用于定量风险分析？","options":["风险概率和影响评估","敏感性分析（龙卷风图）","SWOT分析","风险分解结构（RBS）"],"answer":"B","explain":"敏感性分析（龙卷风图）是定量风险分析的工具，用于确定哪些风险对项目目标影响最大。A、C、D是定性分析工具。","category":"风险管理","type":"single","qType":"single"},{"q":"风险再评估应该在什么时候进行？","options":["仅在项目收尾时","定期和在预定里程碑时","仅在发现新风险时","仅在风险发生时"],"answer":"B","explain":"风险再评估应定期进行，或在项目预定里程碑时进行，以及当项目进入新阶段时。风险是动态的，需要持续监控。","category":"风险管理","type":"single","qType":"single"},{"q":"以下哪种合同类型对卖方风险最大？","options":["固定总价合同（FFP）","成本加固定费合同（CPFF）","总价加激励费合同（FPIF）","工料合同（T&M）"],"answer":"A","explain":"FFP对卖方风险最大，因为卖方必须承担实际成本超支的风险。如果实际成本超过合同价，卖方需自行消化。","category":"采购管理","type":"single","qType":"single"},{"q":"投标人会议（又称标前会议）的主要目的是？","options":["选择中标者","确保所有潜在卖方对采购有同等理解","协商合同条款","签订采购合同"],"answer":"B","explain":"投标人会议是在准备投标书之前召开的会议，确保所有潜在卖方对采购要求有清晰、一致的理解，保证公平竞争。","category":"采购管理","type":"single","qType":"single"},{"q":"自制或外购分析在哪个过程进行？","options":["实施采购","控制采购","规划采购管理","结束采购"],"answer":"C","explain":"自制或外购分析是规划采购管理过程的工具与技术，用于决定某项工作应该由项目团队自行完成还是从外部采购。","category":"采购管理","type":"single","qType":"single"},{"q":"以下哪项是结束采购过程的输出？","options":["采购工作说明书","选定的卖方","关闭的采购和更新的组织过程资产","合同变更"],"answer":"C","explain":"结束采购的输出是关闭的采购和更新的组织过程资产（如经验教训、采购文件归档等）。","category":"采购管理","type":"single","qType":"single"},{"q":"以下哪项是识别相关方过程的有效工具？","options":["相关方参与度评估","相关方映射分析/方格","沟通方法","变更日志"],"answer":"B","explain":"相关方映射分析（权力/利益方格、权力/影响方格等）是识别相关方过程的重要工具，用于分类和优先排序相关方。","category":"相关方管理","type":"single","qType":"single"},{"q":"相关方参与度评估矩阵中，如果相关方当前的参与水平是「不知晓」，目标水平是「支持」，项目经理应该？","options":["无需采取行动","制定策略提升该相关方的参与水平","将该相关方排除在沟通范围外","降低对该相关方的关注度"],"answer":"B","explain":"当相关方的当前参与水平低于期望水平时，项目经理需要制定策略来弥合差距，提升相关方的参与度和支持度。","category":"相关方管理","type":"single","qType":"single"},{"q":"权力/影响方格中，「低权力-高影响」的相关方应该如何管理？","options":["令其满意","重点管理","监督","随时告知"],"answer":"C","explain":"低权力-高影响的相关方属于「监督」类别。需要保持关注，确保他们的利益和期望被纳入考虑。","category":"相关方管理","type":"single","qType":"single"},{"q":"在敏捷项目管理中，Sprint回顾会议的主要目的是？","options":["评审可交付成果","改进团队流程和方法","更新产品待办列表","展示产品给客户"],"answer":"B","explain":"Sprint回顾会议（Retrospective）是团队反思改进的会议，目的是总结本次迭代中哪些做得好、哪些需要改进，持续优化团队流程。","category":"综合","type":"single","qType":"single"},{"q":"以下哪个是PMBOK第六版中新增的知识领域？","options":["整合管理","相关方管理","沟通管理","质量管理"],"answer":"B","explain":"PMBOK第六版将原来的干系人管理升级为独立的知识领域——相关方管理（Stakeholder Management），从10个知识领域变为10个。","category":"综合","type":"single","qType":"single"},{"q":"经验教训登记册应该在什么时候更新？","options":["仅在项目收尾时","整个项目生命周期中","仅在出现重大问题时","仅在里程碑时"],"answer":"B","explain":"经验教训应在整个项目生命周期中持续记录和更新，而非仅在特定时间点。这样能确保知识被及时捕获和应用。","category":"综合","type":"single","qType":"single"},{"q":"项目章程通常由谁批准？","options":["项目经理","职能经理","项目发起人或高级管理层","CCB"],"answer":"C","explain":"项目章程由项目发起人、PMO或项目组合指导委员会批准，赋予项目经理动用组织资源的权力。","category":"整合管理","type":"single","qType":"single"},{"q":"以下哪些属于项目变更的输入？","options":["变更请求","工作绩效报告","项目章程","批准的变更请求"],"answer":"AB","explain":"实施整体变更控制的输入包括变更请求、工作绩效报告、事业环境因素和组织过程资产。项目章程是制定项目章程的输出。","category":"整合管理","type":"multi","qType":"multi"},{"q":"以下哪些是有效的风险识别技术？","options":["德尔菲技术","访谈","核对单","标杆对照"],"answer":"ABCD","explain":"德尔菲技术、访谈、核对单分析、标杆对照都是识别风险的常用技术。德尔菲避免群体思维，访谈获取专家经验。","category":"风险管理","type":"multi","qType":"multi"},{"q":"以下哪些属于事业环境因素（EEF）？","options":["组织文化和结构","市场条件","项目管理信息系统","项目章程"],"answer":"AB","explain":"事业环境因素是项目团队无法控制的内外部条件（组织文化、市场条件等）。PMIS和组织过程资产是内部资产，项目章程是项目文件。","category":"综合","type":"multi","qType":"multi"},{"q":"以下哪些属于规划过程组的过程？","options":["制定项目管理计划","规划采购管理","估算成本","实施整体变更控制"],"answer":"ABC","explain":"ABC都是规划过程组的过程。实施整体变更控制属于监控过程组。","category":"综合","type":"multi","qType":"multi"},{"q":"敏捷方法只适用于软件开发项目。","answer":"错","explain":"敏捷方法适用于任何需要快速响应变化、持续迭代交付的项目，不仅限于软件开发。制造、营销、教育等领域也可应用敏捷。","category":"综合","type":"judge","qType":"judge"},{"q":"项目的临时性意味着项目是短暂的。","answer":"错","explain":"临时性是指项目有明确的起点和终点，并不意味着项目持续的时间短。有些项目可能持续数年。","category":"综合","type":"judge","qType":"judge"},{"q":"镀金（Gold Plating）是指超出客户要求提供额外功能，PMP不鼓励这种做法。","answer":"对","explain":"镀金是指项目团队在没有正式需求的情况下擅自增加范围。PMP强调按范围基准交付，不做额外的无用工作，镀金会导致范围蔓延。","category":"范围管理","type":"judge","qType":"judge"},{"q":"在敏捷开发中，产品负责人的职责是确保产品待办列表的可见性、透明度和清晰度。","answer":"对","explain":"Scrum中产品负责人（Product Owner）负责管理产品待办列表的优先级和内容，确保团队理解待办列表项的含义，PO是唯一有权修改待办列表的人。","category":"资源管理","type":"judge","qType":"judge"},{"q":"项目管理五大过程组分别是：启动、_____、执行、监控和收尾。","answer":"规划","explain":"PMBOK定义的五大过程组：启动（Initiating）、规划（Planning）、执行（Executing）、监控（Monitoring & Controlling）、收尾（Closing）。","category":"综合","type":"fill","qType":"fill"},{"q":"风险敞口总额（EMV计算）中，EMV 的全称是 _____。","answer":"Expected Monetary Value","explain":"EMV（Expected Monetary Value，预期货币价值）= 概率 x 影响，用于定量风险分析中计算风险敞口。","category":"风险管理","type":"fill","qType":"fill"},{"q":"PMBOK 第六版包含 _____ 个知识领域。","answer":"10","explain":"PMBOK第六版包含10个知识领域：整合、范围、进度、成本、质量、资源、沟通、风险、采购、相关方。","category":"综合","type":"fill","qType":"fill"},{"q":"项目整合管理的核心职责属于谁？","options":["项目发起人","职能经理","项目经理","PMO"],"answer":"C","explain":"项目整合管理是项目经理的核心职责。项目经理负责协调各个知识领域的工作，确保项目各要素协调一致。","category":"整合管理","type":"single","qType":"single"},{"q":"里程碑列表与里程碑计划的主要区别是？","options":["没有区别","里程碑计划包含强制性日期","里程碑列表是活动清单的一部分","里程碑计划用于成本估算"],"answer":"B","explain":"里程碑列表仅列出里程碑事件；里程碑计划（或称里程碑进度计划）可能包含强制性强加的日期（如合同要求的交付日期），不可更改。","category":"进度管理","type":"single","qType":"single"},{"q":"成本加百分比合同（CPPC）的主要问题是什么？","options":["买方成本过高","卖方没有动力控制成本","卖方可能故意增加成本以获取更多利润","合同条款过于复杂"],"answer":"C","explain":"CPPC按实际成本的百分比支付利润，卖方成本越高利润越多，因此缺乏控制成本的动力。PMBOK明确指出此类合同对买方不利。","category":"采购管理","type":"single","qType":"single"},{"q":"以下哪种情况应该使用管理储备？","options":["已知风险发生时","未知风险发生时","范围变更时","质量不合格时"],"answer":"B","explain":"管理储备用于应对未知-未知风险（无法提前识别和规划的风险），使用前需要管理层审批。","category":"成本管理","type":"single","qType":"single"},{"q":"戴明环（PDCA）中「Act」阶段的核心活动是？","options":["制定计划","执行计划","检查偏差并采取措施","标准化和改进"],"answer":"D","explain":"PDCA的Act阶段是根据Check阶段的反馈，将有效措施标准化（纳入流程），对未解决的问题进入下一个PDCA循环持续改进。","category":"质量管理","type":"single","qType":"single"},{"q":"以下哪项是项目成功最重要的因素？","options":["使用最新的项目管理软件","相关方参与和有效沟通","严格遵循所有流程","投入最大资源"],"answer":"B","explain":"PMP考试强调相关方管理和沟通对项目成功至关重要。项目成功不仅仅是按时按预算，更要满足相关方期望。","category":"综合","type":"single","qType":"single"},{"q":"项目经理收到客户口头提出的变更要求，应该？","options":["立即执行变更","要求客户提交书面变更请求","拒绝变更","自行评估后决定"],"answer":"B","explain":"所有变更请求（无论口头还是书面）都必须正式记录。项目经理应要求客户提交书面变更请求，然后进入变更控制流程。","category":"整合管理","type":"single","qType":"single"},{"q":"以下哪些是组织过程资产（OPA）的组成部分？","options":["标准化的指南和工作指示","模板","变更控制程序","组织的文化和政治氛围"],"answer":"ABC","explain":"OPA包括流程资产（指南、模板、程序）和知识资产（经验教训、历史信息）。组织文化属于事业环境因素（EEF）。","category":"综合","type":"multi","qType":"multi"},{"q":"以下哪些属于监控项目工作的工具与技术？","options":["专家判断","数据分析","会议","挣值分析"],"answer":"ABCD","explain":"监控项目工作的工具包括专家判断、数据分析（偏差分析、趋势分析等）、决策技术、会议。挣值分析属于数据分析的一种。","category":"整合管理","type":"multi","qType":"multi"}]'),wc={questions:mc},qc=wc.questions,bc={class:"container"},_c={class:"header"},xc={class:"view-tabs"},Cc={key:0,style:{color:"#f44336"}},Tc={style:{"margin-bottom":"15px"}},kc={class:"practice-stats"},Sc={class:"practice-progress"},Ws="quiz-vue-state",Ac={__name:"App",setup(e){const t=re("pm"),n=re("all"),s=re("全部"),r=re(0),l=re("quiz"),o=re(!1),i=re([]),a=re(!1
